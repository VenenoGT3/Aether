name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Aether quality gate.
#
# Runs on every pull request into a protected branch, and again on push to those
# branches (post-merge verification). The four jobs run in parallel and each
# surfaces as its OWN status check, so branch protection can require them by name:
#
#       typecheck · lint · test · preflight
#
# Keep these job names stable — they are referenced verbatim by the branch
# protection rules (see scripts/setup-branch-protection.sh and GITHUB-SETUP.md).
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [main, staging, development]
  push:
    branches: [main, staging, development]

# Only the latest run per branch/PR needs to finish; cancel superseded runs for
# faster feedback and fewer wasted minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

jobs:
  # Static type safety — `tsc --noEmit`, zero type errors.
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # ESLint — zero errors (warnings allowed).
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  # Vitest unit/integration suite (money, fraud, RLS, escrow, payouts, …).
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  # Configuration preflight (scripts/preflight.ts): asserts that the REQUIRED env
  # vars are PRESENT and that production-only safety rules hold. It NEVER validates
  # secret *values*, and its hard-fail checks are gated on VERCEL_ENV=production
  # (never set in CI). Real repository secrets are used when configured; otherwise
  # safe placeholders satisfy the "is it set?" contract so the script still runs
  # end-to-end.
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_placeholder' }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || 'pk_test_ci_placeholder' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://ci.example.com' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'ci-placeholder-cron-secret' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run preflight
